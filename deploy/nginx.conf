# Aurelia web — static SPA + /api reverse proxy.
#
# Two responsibilities:
#   1. Serve the built Vite assets with SPA history fallback.
#   2. Proxy /api to the Go server, configured for Server-Sent Events
#      (the chat stream at POST /api/conversations/:id/messages must not be
#      buffered or it arrives all-at-once instead of token-by-token).

server {
    listen 80;
    server_name _;

    # Resolve the `api` service name via Docker's embedded DNS on EVERY request
    # (paired with the variable proxy_pass below). A static `upstream {}` block
    # resolves the name only once at startup, so recreating the api container
    # (which gives it a new IP) would leave nginx talking to a dead IP → 502.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Uploads can be up to MAX_UPLOAD_BYTES (50 MB default) — give headroom.
    client_max_body_size 64m;

    # Long-lived gzip for the immutable hashed assets.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    root /usr/share/nginx/html;
    index index.html;

    # ---- API + SSE ---------------------------------------------------------
    location /api/ {
        # Variable in proxy_pass → nginx re-resolves `api` per request via the
        # resolver above, instead of caching one IP at boot.
        set $aurelia_api api:8787;
        proxy_pass http://$aurelia_api$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE: disable buffering and keep the upstream connection streaming.
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # ---- Static SPA --------------------------------------------------------
    # Hashed build assets: cache hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # History-mode fallback: every unknown path returns index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
