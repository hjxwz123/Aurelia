# Aurelia — production stack: Postgres + Redis + Qdrant + Go API + nginx SPA.
#
# Two ways to bring this up:
#
#   1) Pull prebuilt images from ghcr.io (recommended for deploys):
#        cd deploy
#        cp .env.example .env          # then edit secrets
#        docker compose -f docker-compose.prod.yml pull
#        docker compose -f docker-compose.prod.yml up -d
#
#   2) Build locally from source (recommended for development / CI smoke tests):
#        cd deploy
#        cp .env.example .env
#        docker compose -f docker-compose.prod.yml up -d --build
#
# The api / web services declare BOTH `image:` and `build:`. Compose picks the
# image when present, falls back to build otherwise — so the same file serves
# both flows without duplicating the topology.
#
# The API auto-detects its backends from the URLs below: postgres:// →
# Postgres, REDIS_URL set → Redis, QDRANT_URL set → Qdrant. Unset any of them
# and that subsystem falls back (SQLite / in-memory / brute-force vectors) —
# which is how local dev runs with nothing installed.

name: aurelia

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aurelia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-aurelia}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aurelia} -d ${POSTGRES_DB:-aurelia}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [internal]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Password-protected + append-only persistence for the kill-signal pub/sub
    # and rate-limit counters.
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks: [internal]

  qdrant:
    image: qdrant/qdrant:v1.12.4
    restart: unless-stopped
    environment:
      # Qdrant requires this key on every request; the api sends the SAME value
      # (QDRANT_API_KEY below). Both default to one shared internal value so it
      # works with zero config — Qdrant has no published port (private network
      # only). Override QDRANT_API_KEY in .env for a real secret.
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-aurelia-internal-qdrant}
    volumes:
      - qdrantdata:/qdrant/storage
    networks: [internal]

  # Sandbox — bundled with the stack so a single `docker compose up` carries it;
  # no separate project, no key to configure. It is deliberately NOT published
  # to any host port: only the `api` service reaches it over the private
  # `internal` network, so it is never exposed to the internet.
  #
  # It drives the host Docker daemon (mounted socket) to spawn one locked-down
  # per-session container, and pulls its runtime image from ghcr on boot.
  # SECURITY: the mounted docker.sock is root-equivalent on the host; keeping
  # the service internal-only (no ports) is what contains that blast radius.
  sandbox:
    image: ghcr.io/${IMAGE_OWNER:-hjxwz123}/aurelia-sandbox-sidecar:${IMAGE_TAG:-latest}
    build:
      context: ../sandbox-service
      dockerfile: Dockerfile.sidecar
    restart: unless-stopped
    environment:
      # Shared internal default — must match the api's SANDBOX_API_KEY above.
      SANDBOX_API_KEY: ${SANDBOX_API_KEY:-aurelia-bundled-sandbox}
      # Per-session runtime image, pulled from ghcr on boot so the first call works.
      SANDBOX_IMAGE: ghcr.io/${IMAGE_OWNER:-hjxwz123}/aurelia-sandbox:${IMAGE_TAG:-latest}
      SANDBOX_PULL_ON_START: "1"
      SANDBOX_NETWORK: ${SANDBOX_NETWORK:-none}   # "bridge" only if sandboxed code needs internet
      SANDBOX_MEMORY: ${SANDBOX_MEMORY:-2g}
      SANDBOX_CPUS: ${SANDBOX_CPUS:-1}
      SANDBOX_MAX_SESSIONS: ${SANDBOX_MAX_SESSIONS:-16}
      SANDBOX_READ_ONLY_ROOTFS: "1"
      SANDBOX_WORKSPACE_SIZE: ${SANDBOX_WORKSPACE_SIZE:-512m}
    volumes:
      # Required: the sidecar spawns sibling session containers via the host daemon.
      - /var/run/docker.sock:/var/run/docker.sock
    networks: [internal]

  api:
    # Prebuilt image from the docker-images.yml workflow. Override IMAGE_OWNER
    # in .env if you forked into a different account.
    image: ghcr.io/${IMAGE_OWNER:-hjxwz123}/aurelia-api:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: deploy/Dockerfile.server
    restart: unless-stopped
    # NOTE: the api does NOT depend_on the sandbox. The sandbox is a soft,
    # per-request HTTP dependency (only code execution needs it) — making it a
    # startup dependency would block the whole API (→ nginx 502) whenever the
    # sandbox image is unavailable or the container is unhealthy.
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    environment:
      AURELIA_LISTEN: ":8787"
      AURELIA_ENV: production
      # --- Backends (auto-detected by URL scheme) ---
      DATABASE_URL: "postgres://${POSTGRES_USER:-aurelia}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aurelia}?sslmode=disable"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
      QDRANT_URL: "http://qdrant:6333"
      # Must match qdrant's QDRANT__SERVICE__API_KEY above (same default).
      QDRANT_API_KEY: ${QDRANT_API_KEY:-aurelia-internal-qdrant}
      # --- Auth / app ---
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      ALLOWED_ORIGINS: ${PUBLIC_ORIGIN:-http://localhost}
      # No admin is seeded from the environment — on first boot the deployment has
      # zero users and the first account created via the setup screen becomes the
      # administrator (§ first-run setup).
      ENABLE_MOCK_PROVIDER: ${ENABLE_MOCK_PROVIDER:-false}
      # --- Optional integrations (channel keys live in the DB, not here) ---
      SEARCH_PROVIDER: ${SEARCH_PROVIDER:-}
      SEARCH_API_KEY: ${SEARCH_API_KEY:-}
      SEARCH_BASE_URL: ${SEARCH_BASE_URL:-}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-1536}
      MINERU_API_URL: ${MINERU_API_URL:-}
      MINERU_API_KEY: ${MINERU_API_KEY:-}
      # --- Sandbox (bundled) ---
      # The API talks to the in-stack sandbox over the private network. It is
      # never published to a host port, so it's unreachable from the internet.
      # The key is a shared internal default — nothing to configure. (Leave the
      # admin sandbox_base_url / sandbox_api_key fields BLANK so these win.)
      SANDBOX_BASE_URL: "http://sandbox:8000"
      SANDBOX_API_KEY: ${SANDBOX_API_KEY:-aurelia-bundled-sandbox}
    volumes:
      # Uploads + artifacts (and the SQLite file, if ever used) are filesystem-
      # backed regardless of DB backend. Bind-mounted to a HOST directory so the
      # files live on the host — directly visible and backup-able — rather than
      # trapped inside a Docker-managed volume. Override the host path with
      # DATA_DIR in .env (defaults to ./data next to this compose file).
      - ${DATA_DIR:-./data}:/app/data
    networks: [internal]

  web:
    image: ghcr.io/${IMAGE_OWNER:-hjxwz123}/aurelia-web:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - "${WEB_PORT:-80}:80"
    networks: [internal]

volumes:
  pgdata:
  redisdata:
  qdrantdata:

networks:
  internal:
    driver: bridge

